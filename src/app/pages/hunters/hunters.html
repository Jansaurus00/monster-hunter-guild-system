<div class="hunters-page">
    <div class="overlay">
        <h1>Hunter Registry</h1>
        <p class="subtitle">
            Register and manage elite hunters of the Seliana Guild
        </p>

        <div class="form-card">
            <h2>Hunter Registration</h2>
            <form>
                <input type="text" placeholder="Hunter Name" [(ngModel)]="hunter.name" name="name">
                <input type="number" placeholder="Hunter Rank" [(ngModel)]="hunter.rank" name="rank">
                <input type="text" placeholder="Main Weapon" [(ngModel)]="hunter.weapon" name="weapon">
                <input type="text" placeholder="Guild Email" [(ngModel)]="hunter.email" name="email">
                <button type="button" (click)="selectedId ? updateHunter() : addHunter()"> {{ selectedId ? 'Update Hunter' : 'Register Hunter'}} </button>
            </form>
        </div>

        <h2 class="registry-title">Registered Hunter</h2>
        <div class="hunter-grid">
            <div class="hunter-card" *ngFor="let hunter of hunters">
                <h3>{{ hunter.name }}</h3>
                <p><strong>Rank: </strong>{{ hunter.rank }}</p>
                <p><strong>Weapon: </strong>{{ hunter.weapon }}</p>
                <p><strong>Email: </strong>{{ hunter.email }}</p>

                <div class="buttons">
                    <button class="edit-btn" (click)="editHunter(hunter)">Edit</button>
                    <button class="delete-btn" (click)="deleteHunter(hunter._id)">Delete</button>
                </div>
            </div>
        </div>
    </div>
</div>
